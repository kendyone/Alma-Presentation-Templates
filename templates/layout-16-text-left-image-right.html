<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../animations.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .slide {
    width: 1920px;
    height: 1080px;
    background: #FFFFFF;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .content-row {
    width: 1760px;
    height: 936px;
    display: flex;
    flex-direction: row;
    gap: 56px;
  }

  .text-block {
    width: 852px;
    height: 936px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    padding: 32px;
  }

  .text-headline {
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 90px;
    line-height: 98px;
    color: #1D1D1D;
  }

  .text-body {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 44px;
    color: #57575B;
  }

  .photo-block {
    flex: 1;
    height: 936px;
    border-radius: 32px;
    object-fit: cover;
    background: #D0D0D0;
  }
</style>
</head>
<body>

<!--
  LAYOUT: Layout_16_Text_Left_Image_Right
  USE: Mirror of Layout_15. Alternate photo sides across slides for visual rhythm.
  PHOTO: replace src with image path. Fills 852×936px with object-fit: cover.
  BODY: remove <p class="text-body"> if no supporting text is needed.
  FORBIDDEN: lists, charts, tables, more than one photo, body >300 chars.
-->

<section class="slide" data-layout="Layout_16_Text_Left_Image_Right">
  <div class="content-row">

    <div class="text-block reveal" style="--delay:0.1s">
      <h1 class="text-headline">Find the right candidates for your company</h1>
      <!-- Optional: remove if no body text -->
      <p class="text-body">Alma Career operates or cooperates with almost 30 job portals that are among the top in Europe and deliver more than 12 million responses to our clients per month.</p>
    </div>

    <img class="photo-block reveal" style="--delay:0.25s" src="../images/office2.png" alt="">

  </div>
</section>

<script src="../animations.js"></script>

</body>
</html>
