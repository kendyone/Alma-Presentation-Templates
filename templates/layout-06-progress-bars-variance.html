<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../animations.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-primary-black:   #1D1D1D;
    --color-secondary-black: #57575B;
    --color-bg-primary:      #FFFFFF;
    --bar-track:             #FFE5D9;
    --bar-fill:              #FD7E40;
    --variance-positive:     #2E8172;
    --variance-negative:     #A02626;
  }

  .slide {
    width: 1920px;
    height: 1080px;
    background: var(--color-bg-primary);
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    gap: 56px;
    overflow: hidden;
  }

  .slide-header {
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: 124px;
    flex-shrink: 0;
  }
  .slide-header .headline {
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 64px;
    line-height: 64px;
    color: var(--color-primary-black);
  }
  .slide-header .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 44px;
    color: var(--color-secondary-black);
  }

  .progress-rows {
    display: flex;
    flex-direction: column;
  }

  .progress-row {
    display: flex;
    align-items: flex-end;
    gap: 64px;
    padding: 24px 0;
    height: 152px;
  }

  .progress-left {
    flex: 0 0 1297px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .progress-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 44px;
    color: var(--color-primary-black);
  }

  .progress-track {
    width: 100%;
    height: 40px;
    background: var(--bar-track);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--bar-fill);
    /* width set by JS from data-value */
  }

  .progress-variance {
    flex: 0 0 183px;
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 56px;
    line-height: 56px;
    text-align: right;
  }

  .progress-variance.positive { color: var(--variance-positive); }
  .progress-variance.negative { color: var(--variance-negative); }

  .progress-value {
    flex: 0 0 152px;
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 56px;
    line-height: 56px;
    color: var(--color-primary-black);
    text-align: right;
  }
</style>
</head>
<body>

<!--
  LAYOUT: Layout_06_ProgressBars_WithVariance
  USE: Exactly 4 items with both a final percentage AND a signed variance (delta).
  BAR: fill = finalValue% of track (data-value on .progress-row).
  VARIANCE: class "positive" for green, "negative" for red.
  FORBIDDEN: missing variance, non-percentage data, ≠4 rows.
  ANIMATION: .progress-fill.fill-scale animates left→right; delay matches its row.
-->

<section class="slide" data-layout="Layout_06_ProgressBars_WithVariance">

  <div class="slide-header">
    <h1 class="headline reveal" style="--delay:0.05s">Headline</h1>
    <p class="subtitle reveal" style="--delay:0.15s">Subtitle text goes here</p>
  </div>

  <div class="progress-rows">

    <div class="progress-row reveal" data-value="67" style="--delay:0.25s">
      <div class="progress-left">
        <p class="progress-label">Product deliverables</p>
        <div class="progress-track"><div class="progress-fill fill-scale" style="--delay:0.25s"></div></div>
      </div>
      <span class="progress-variance positive">+55 %</span>
      <span class="progress-value count-up" data-target="67" data-suffix=" %">67 %</span>
    </div>

    <div class="progress-row reveal" data-value="56" style="--delay:0.35s">
      <div class="progress-left">
        <p class="progress-label">Product deliverables</p>
        <div class="progress-track"><div class="progress-fill fill-scale" style="--delay:0.35s"></div></div>
      </div>
      <span class="progress-variance negative">−10 %</span>
      <span class="progress-value count-up" data-target="56" data-suffix=" %">56 %</span>
    </div>

    <div class="progress-row reveal" data-value="36" style="--delay:0.45s">
      <div class="progress-left">
        <p class="progress-label">Product deliverables</p>
        <div class="progress-track"><div class="progress-fill fill-scale" style="--delay:0.45s"></div></div>
      </div>
      <span class="progress-variance positive">+5 %</span>
      <span class="progress-value count-up" data-target="36" data-suffix=" %">36 %</span>
    </div>

    <div class="progress-row reveal" data-value="36" style="--delay:0.55s">
      <div class="progress-left">
        <p class="progress-label">Product deliverables</p>
        <div class="progress-track"><div class="progress-fill fill-scale" style="--delay:0.55s"></div></div>
      </div>
      <span class="progress-variance negative">−12 %</span>
      <span class="progress-value count-up" data-target="36" data-suffix=" %">36 %</span>
    </div>

  </div>

</section>

<script>
  document.querySelectorAll('.progress-row').forEach(row => {
    const val = parseFloat(row.dataset.value);
    row.querySelector('.progress-fill').style.width = val + '%';
  });
</script>
<script src="../animations.js"></script>

</body>
</html>
