<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../animations.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .slide {
    width: 1920px;
    height: 1080px;
    background: #FFFFFF;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .content-card {
    flex: 1;
    background: #FFCB3B;
    border-radius: 32px;
    padding: 0 164px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 80px;
  }

  .claim {
    width: 1000px;
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 90px;
    line-height: 98px;
    color: #1D1D1D;
  }

  .speakers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }

  .speaker-card {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 24px;
    height: 90px;
  }

  .speaker-photo {
    width: 90px;
    height: 90px;
    border-radius: 32px;
    flex-shrink: 0;
    background: #F2F3F5;
    object-fit: cover;
    display: block;
  }

  .speaker-info {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .speaker-name {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 44px;
    color: #1D1D1D;
  }

  .speaker-role {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 34px;
    color: #3A3A3D;
  }
</style>
</head>
<body>

<!--
  LAYOUT: Layout_24_Farewell_Multi_Speaker
  USE: Final slide with 2–4 speakers. For 1 speaker use Layout_23.
  BACKGROUND: full yellow card (#FFCB3B), no header.
  CLAIM: max 50 chars (Newsreader 600, 90px).
  SPEAKER NAME: max 25 chars. ROLE: max 25 chars.
  PHOTO: replace .speaker-photo <div> with <img class="speaker-photo" src="..." alt="...">
  REMOVING SPEAKERS: delete .speaker-card elements (grid auto-adjusts columns).
  FORBIDDEN: more than 4 speakers, biographical text, bullet lists.
-->

<section class="slide" data-layout="Layout_24_Farewell_Multi_Speaker">
  <div class="content-card">

    <h1 class="claim reveal" style="--delay:0.1s">Thank you for your attention.</h1>

    <!-- 2×2 grid for 4 speakers. Remove cards for 2–3 speakers. -->
    <div class="speakers-grid">

      <div class="speaker-card reveal" style="--delay:0.25s">
        <img class="speaker-photo" src="../images/Avatar01.jpg" alt="">
        <div class="speaker-info">
          <p class="speaker-name">Tihana Biga-Laatikainen</p>
          <p class="speaker-role">Lead UI Designer</p>
        </div>
      </div>

      <div class="speaker-card reveal" style="--delay:0.35s">
        <img class="speaker-photo" src="../images/Avatar02.jpg" alt="">
        <div class="speaker-info">
          <p class="speaker-name">Tihana Biga-Laatikainen</p>
          <p class="speaker-role">Lead UI Designer</p>
        </div>
      </div>

      <div class="speaker-card reveal" style="--delay:0.45s">
        <img class="speaker-photo" src="../images/Avatar03.jpg" alt="">
        <div class="speaker-info">
          <p class="speaker-name">Tihana Biga-Laatikainen</p>
          <p class="speaker-role">Lead UI Designer</p>
        </div>
      </div>

      <div class="speaker-card reveal" style="--delay:0.55s">
        <img class="speaker-photo" src="../images/Avatar04.jpg" alt="">
        <div class="speaker-info">
          <p class="speaker-name">Tihana Biga-Laatikainen</p>
          <p class="speaker-role">Lead UI Designer</p>
        </div>
      </div>

    </div>

  </div>
</section>

<script src="../animations.js"></script>

</body>
</html>
