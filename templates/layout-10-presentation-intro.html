<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../animations.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .slide {
    width: 1920px;
    height: 1080px;
    background: #FFFFFF;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .intro-card {
    width: 1760px;
    height: 936px;
    background: #8F66FF;
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 80px;
    padding: 0 164px;
  }

  .intro-card[data-theme="dark"]      { background: #1D1D1D; }
  .intro-card[data-theme="yellow"]    { background: #FFCB3B; }
  .intro-card[data-theme="turquoise"] { background: #4DD7BE; }
  .intro-card[data-theme="orange"]    { background: #FD7E40; }

  .intro-content {
    display: flex;
    flex-direction: column;
    gap: 32px;
    max-width: 1000px;
  }

  .intro-headline {
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 90px;
    line-height: 98px;
    color: #1D1D1D;
  }

  .intro-description {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 44px;
    color: #3A3A3D;
  }

  .intro-author {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 24px;
  }

  .intro-photo {
    width: 90px;
    height: 90px;
    border-radius: 32px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.3);
  }

  .intro-author-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
  }

  .intro-name {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 44px;
    color: #1D1D1D;
  }

  .intro-role {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 34px;
    color: #3A3A3D;
  }

  .intro-card[data-theme="dark"] .intro-headline,
  .intro-card[data-theme="dark"] .intro-name { color: #FFFFFF; }

  .intro-card[data-theme="dark"] .intro-description,
  .intro-card[data-theme="dark"] .intro-role { color: rgba(255, 255, 255, 0.65); }
</style>
</head>
<body>

<!--
  LAYOUT: Layout_10_Presentation_Intro
  USE: First slide of a presentation or new main topic block.
  THEME: set data-theme on .intro-card — "violet" (default), "dark", "yellow", "turquoise", "orange"
  PHOTO: replace src with image path, or remove <img> entirely if no photo available.
  FORBIDDEN: lists, charts, metrics, paragraphs >250 chars, more than one speaker.
-->

<section class="slide" data-layout="Layout_10_Presentation_Intro">
  <div class="intro-card" data-theme="violet">

    <div class="intro-content reveal" style="--delay:0.1s">
      <h1 class="intro-headline">Find the right candidates for your company.</h1>
      <p class="intro-description">Alma Career operates or cooperates with almost 30 job portals that are among the top in Europe and deliver more than 12 million responses to our clients per month.</p>
    </div>

    <div class="intro-author reveal" style="--delay:0.3s">
      <!-- Optional: remove <img> if no photo -->
      <img class="intro-photo" src="../images/Avatar02.jpg" alt="">
      <div class="intro-author-text">
        <span class="intro-name">Tihana Biga-Laatikainen</span>
        <span class="intro-role">Lead UI Designer</span>
      </div>
    </div>

  </div>
</section>

<script src="../animations.js"></script>

</body>
</html>
