<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../animations.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-primary-black:   #1D1D1D;
    --color-secondary-black: #57575B;
    --color-bg-primary:      #FFFFFF;
    --tile-lavender-bg:      #E9E0FF;
    --tile-lavender-stat:    #432989;
  }

  .slide {
    width: 1920px;
    height: 1080px;
    background: var(--color-bg-primary);
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    gap: 56px;
    overflow: hidden;
  }

  .slide-header {
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: 124px;
    flex-shrink: 0;
  }
  .slide-header .headline {
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 64px;
    line-height: 64px;
    color: var(--color-primary-black);
  }
  .slide-header .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 44px;
    color: var(--color-secondary-black);
  }

  .grid-2x2 {
    display: flex;
    flex-direction: column;
    gap: 56px;
    height: 756px;
  }

  .grid-row {
    display: flex;
    gap: 56px;
    height: 350px;
  }

  .tile {
    flex: 1;
    background: var(--tile-lavender-bg);
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    border-radius: 24px;
  }

  .tile-stat {
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 90px;
    line-height: 90px;
    color: var(--tile-lavender-stat);
  }

  .tile-info {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tile-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 44px;
    color: var(--color-primary-black);
  }

  .tile-desc {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 34px;
    color: var(--color-primary-black);
  }
</style>
</head>
<body>

<!--
  LAYOUT: Layout_03_GridMetrics_4Tiles
  USE: Exactly 4 related but different metrics in a 2×2 grid.
  COLOR: All tiles uniform lavender — no color variation.
  FORBIDDEN: words in main value, long text, bullet lists, ≠4 data points.
  ALIGNMENT: .tile uses flex-direction:column + gap:40px (no justify-content). Stat is always 1 line (90px), so tile-label always starts at the same height across tiles in a row — do NOT use justify-content:center or margin-top:auto on .tile-info.
  ANIMATION: .tile reveal (fade in) — no count-up on tiles
-->

<section class="slide" data-layout="Layout_03_GridMetrics_4Tiles">

  <div class="slide-header">
    <h1 class="headline reveal" style="--delay:0.05s">Headline</h1>
    <p class="subtitle reveal" style="--delay:0.15s">Subtitle text goes here</p>
  </div>

  <div class="grid-2x2">

    <div class="grid-row">
      <div class="tile reveal" style="--delay:0.25s">
        <span class="tile-stat">21 000 €</span>
        <div class="tile-info">
          <p class="tile-label">Tile headline</p>
          <p class="tile-desc">Year-over-year growth across all active markets in Q4.</p>
        </div>
      </div>
      <div class="tile reveal" style="--delay:0.35s">
        <span class="tile-stat">21 %</span>
        <div class="tile-info">
          <p class="tile-label">Tile headline</p>
          <p class="tile-desc">Here's a short description of the statistics.</p>
        </div>
      </div>
    </div>

    <div class="grid-row">
      <div class="tile reveal" style="--delay:0.45s">
        <span class="tile-stat">2M €</span>
        <div class="tile-info">
          <p class="tile-label">Tile headline</p>
          <p class="tile-desc">Here's a short description.</p>
        </div>
      </div>
      <div class="tile reveal" style="--delay:0.55s">
        <span class="tile-stat">15</span>
        <div class="tile-info">
          <p class="tile-label">Tile headline</p>
          <p class="tile-desc">Here's a short description of the statistics.</p>
        </div>
      </div>
    </div>

  </div>

</section>

<script src="../animations.js"></script>

</body>
</html>
